<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Correctable Record</title>
<meta name="description" content="A compact handbook on corrigibility, reliance, and diagnostic governance.">
<style>
:root{
  --bg:#fbf3e4;--paper:#fff9ee;--ink:#201c18;--muted:#6d6258;--rule:rgba(50,38,26,.18);--accent:#5f3d22;
  --top:env(safe-area-inset-top,0px);--bottom:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto}
header{padding:calc(10px + var(--top)) 12px 8px;border-bottom:1px solid var(--rule);background:color-mix(in srgb,var(--bg) 94%,white)}
.topline{max-width:760px;margin:0 auto;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px}
.book-title{font:700 15px/1.15 Georgia,serif;white-space:nowrap}.chapter-title{font:13px/1.2 system-ui,-apple-system,Segoe UI,sans-serif;color:var(--muted);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button{border:1px solid var(--rule);background:var(--paper);color:var(--ink);border-radius:999px;padding:8px 11px;font:13px/1 system-ui,-apple-system,Segoe UI,sans-serif}
main{min-height:0;position:relative;overflow:hidden}.chapter{position:absolute;inset:0;display:none}.chapter.active{display:block}
.chapter-scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}.chapter-inner{max-width:760px;margin:0 auto;padding:22px 18px 56px}
.chapter-kicker{margin:0 0 12px;color:var(--muted);font:12px/1.2 system-ui,sans-serif;text-transform:uppercase;letter-spacing:.12em}
h1,h2,h3,h4{line-height:1.16;margin:1.6rem 0 .75rem}h1{font-size:clamp(2rem,8vw,3.1rem);letter-spacing:-.025em;margin-top:.2rem}h2{font-size:clamp(1.25rem,5vw,1.7rem)}h3{font-size:1.12rem}
p,li{font-size:clamp(18px,4.5vw,20px);line-height:1.55}p{margin:0 0 1rem}ul,ol{padding-left:1.3rem}li{margin:0 0 .45rem}
blockquote{margin:1.2rem 0;padding:.9rem 1rem;border-left:4px solid var(--accent);background:rgba(95,61,34,.08)}blockquote p{margin:0}hr{border:0;border-top:1px solid var(--rule);margin:2rem 0}
footer{padding:8px 12px calc(10px + var(--bottom));border-top:1px solid var(--rule);background:color-mix(in srgb,var(--bg) 94%,white)}.navline{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}.navline .next{justify-self:end}.progress{color:var(--muted);font:12px/1 system-ui,sans-serif;white-space:nowrap}
.drawer{position:fixed;inset:0;z-index:10;display:none;background:rgba(0,0,0,.35);padding:calc(18px + var(--top)) 14px calc(18px + var(--bottom))}.drawer.open{display:grid;place-items:start center}.drawer-panel{width:min(100%,760px);max-height:88dvh;overflow:auto;background:var(--paper);border:1px solid var(--rule);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(40,29,18,.25)}.drawer-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.drawer h2{margin:0}.chapters-list{display:grid;gap:8px}.chapters-list button{width:100%;border-radius:12px;text-align:left;padding:12px;font-size:15px;line-height:1.25}.hint{color:var(--muted);font:12px/1.35 system-ui,sans-serif;margin-top:12px}.reference-material{display:none}
@media(prefers-color-scheme:dark){:root{--bg:#201d19;--paper:#2a251f;--ink:#eee3d3;--muted:#bbaea0;--rule:rgba(238,227,211,.20);--accent:#d2b48c}blockquote{background:rgba(210,180,140,.10)}.drawer{background:rgba(0,0,0,.58)}}
</style>
</head>
<body>
<div class="app" id="app">
<header><div class="topline"><div class="book-title">The Correctable Record</div><div class="chapter-title" id="currentTitle">Loading</div><button type="button" id="menuButton" aria-controls="chapterMenu" aria-expanded="false">Chapters</button></div></header>
<main id="reader" aria-live="polite"><article class="chapter active"><div class="chapter-scroll"><div class="chapter-inner"><p>Loading the book.</p></div></div></article></main>
<footer><div class="navline"><button type="button" id="prevButton">Previous</button><div class="progress" id="progress">—</div><button type="button" id="nextButton" class="next">Next</button></div></footer>
</div>
<div class="drawer" id="chapterMenu" role="dialog" aria-modal="true" aria-label="Chapter menu"><div class="drawer-panel"><div class="drawer-head"><h2>Chapters</h2><button type="button" id="closeMenu">Close</button></div><div class="chapters-list" id="chapterList"></div><p class="hint">Swipe left or right to change chapter. Each chapter scrolls vertically on its own.</p></div></div>
<div class="reference-material" id="referenceMaterial" aria-hidden="true"></div>
<script>
(function(){
  const reader=document.getElementById('reader'), list=document.getElementById('chapterList'), reference=document.getElementById('referenceMaterial');
  const currentTitle=document.getElementById('currentTitle'), progress=document.getElementById('progress'), prev=document.getElementById('prevButton'), next=document.getElementById('nextButton');
  const menu=document.getElementById('chapterMenu'), menuButton=document.getElementById('menuButton'), closeMenu=document.getElementById('closeMenu');
  let chapters=[], index=Number(sessionStorage.getItem('bookChapter')||0);
  function titleWithoutNumber(t){return t.replace(/^\s*\d+\.\s*/, '')}
  function splitBook(doc){
    const main=doc.querySelector('main')||doc.body; const nodes=Array.from(main.children); const sections=[]; let cur={title:'Front Matter', els:[]};
    nodes.forEach(el=>{ if(el.tagName==='H1'){ if(cur.els.length) sections.push(cur); cur={title:el.textContent.trim(), els:[el]}; } else { cur.els.push(el); }}); if(cur.els.length) sections.push(cur);
    const reading=[], refs=[];
    sections.forEach(s=>{ const m=s.title.match(/^(\d+)\.\s*(.*)$/); if(m && Number(m[1])>=1 && Number(m[1])<=15){ s.els[0].textContent=m[2]; s.title=m[2]; reading.push(s); } else refs.push(s); });
    return {reading, refs};
  }
  function render(reading, refs){
    reader.innerHTML=''; list.innerHTML=''; reference.innerHTML=''; chapters=[];
    reading.forEach((s,i)=>{ const article=document.createElement('article'); article.className='chapter'; article.dataset.title=s.title; article.id='chapter-'+i; const scroll=document.createElement('div'); scroll.className='chapter-scroll'; scroll.tabIndex=0; const inner=document.createElement('div'); inner.className='chapter-inner'; inner.innerHTML='<p class="chapter-kicker">'+(i+1)+' of '+reading.length+'</p>'; s.els.forEach(el=>inner.appendChild(el.cloneNode(true))); scroll.appendChild(inner); article.appendChild(scroll); reader.appendChild(article); chapters.push(article); const b=document.createElement('button'); b.type='button'; b.textContent=s.title; b.dataset.goto=i; b.addEventListener('click',()=>{hideMenu();show(i)}); list.appendChild(b); });
    refs.forEach(s=>{ const sec=document.createElement('section'); sec.dataset.title=s.title; s.els.forEach(el=>sec.appendChild(el.cloneNode(true))); reference.appendChild(sec); });
    show(Math.min(Math.max(index,0),chapters.length-1));
  }
  function show(i){ if(!chapters.length) return; index=Math.max(0,Math.min(chapters.length-1,i)); chapters.forEach((c,n)=>c.classList.toggle('active',n===index)); currentTitle.textContent=chapters[index].dataset.title||''; progress.textContent=(index+1)+' / '+chapters.length; prev.disabled=index===0; next.disabled=index===chapters.length-1; sessionStorage.setItem('bookChapter',String(index)); const sc=chapters[index].querySelector('.chapter-scroll'); if(sc) sc.scrollTop=0; }
  function openMenu(){menu.classList.add('open');menuButton.setAttribute('aria-expanded','true')} function hideMenu(){menu.classList.remove('open');menuButton.setAttribute('aria-expanded','false')}
  prev.addEventListener('click',()=>show(index-1)); next.addEventListener('click',()=>show(index+1)); menuButton.addEventListener('click',openMenu); closeMenu.addEventListener('click',hideMenu); menu.addEventListener('click',e=>{if(e.target===menu)hideMenu()});
  document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(index-1); if(e.key==='ArrowRight')show(index+1); if(e.key==='Escape')hideMenu()});
  let sx=0,sy=0,st=0; reader.addEventListener('touchstart',e=>{const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; st=Date.now()},{passive:true}); reader.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-st; if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.35 && dt<900){dx<0?show(index+1):show(index-1)}},{passive:true});
  fetch('correctable_record_simple.html').then(r=>r.text()).then(html=>{const doc=new DOMParser().parseFromString(html,'text/html'); render(...Object.values(splitBook(doc)));}).catch(()=>{currentTitle.textContent='Book unavailable';reader.innerHTML='<article class="chapter active"><div class="chapter-scroll"><div class="chapter-inner"><h1>Book unavailable</h1><p>The source file could not be loaded.</p></div></div></article>'});
})();
</script>
</body>
</html>
