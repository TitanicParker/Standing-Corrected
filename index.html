<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fbf3e4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#201d19" media="(prefers-color-scheme: dark)">
<title>The Correctable Record</title>
<meta name="description" content="A compact handbook on corrigibility, reliance, and diagnostic governance.">
<style>
:root{
  --bg:#fbf3e4;
  --paper:#fff8eb;
  --ink:#201c18;
  --muted:#75695f;
  --rule:rgba(50,38,26,.16);
  --accent:#5f3d22;
  --accent-soft:rgba(95,61,34,.09);
  --shadow:0 18px 48px rgba(40,29,18,.22);
  --top:env(safe-area-inset-top,0px);
  --bottom:env(safe-area-inset-bottom,0px);
  --reader-width:38rem;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink)}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:Georgia,'Times New Roman',serif;touch-action:pan-y;-webkit-font-smoothing:antialiased}
button{font:600 14px/1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:44px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);border-radius:999px;padding:0 14px;touch-action:manipulation}
button:disabled{opacity:.38}
.app{height:100svh;height:100dvh;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
.site-header{padding:calc(8px + var(--top)) 12px 8px;border-bottom:1px solid var(--rule);background:color-mix(in srgb,var(--bg) 94%,white);backdrop-filter:blur(10px)}
.topline{width:min(100%,var(--reader-width));margin:0 auto;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
.book-title{font:700 16px/1.1 Georgia,'Times New Roman',serif;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chapter-title{grid-column:1/-1;color:var(--muted);font:13px/1.25 system-ui,-apple-system,'Segoe UI',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.menu-button{justify-self:end}
.reader{min-height:0;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,0) 80px)}
.chapter{position:absolute;inset:0;display:none}.chapter.active{display:block}.chapter-scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none}.chapter-scroll::-webkit-scrollbar{display:none}.chapter-inner{width:min(100%,var(--reader-width));margin:0 auto;padding:24px 18px 72px}
.chapter-kicker{margin:0 0 14px;color:var(--muted);font:700 12px/1.2 system-ui,-apple-system,'Segoe UI',sans-serif;text-transform:uppercase;letter-spacing:.12em}.chapter h1:first-of-type{margin-top:0}
h1,h2,h3,h4{line-height:1.15;margin:1.75rem 0 .72rem;text-wrap:balance}h1{font-size:clamp(2.05rem,9.2vw,3.2rem);letter-spacing:-.035em}h2{font-size:clamp(1.35rem,5.4vw,1.8rem);letter-spacing:-.015em}h3{font-size:1.18rem}p,li{font-size:clamp(18.5px,4.75vw,21px);line-height:1.58}p{margin:0 0 1.05rem}ul,ol{padding-left:1.35rem;margin:0 0 1.1rem}li{margin:0 0 .48rem}strong{font-weight:700}
blockquote{margin:1.25rem 0;padding:1rem 1rem;border-left:4px solid var(--accent);border-radius:0 14px 14px 0;background:var(--accent-soft)}blockquote p{margin:0}hr{border:0;border-top:1px solid var(--rule);margin:2rem 0}a{color:var(--accent)}
.reader-footer{padding:8px 12px calc(9px + var(--bottom));border-top:1px solid var(--rule);background:color-mix(in srgb,var(--bg) 94%,white);backdrop-filter:blur(10px)}.navline{width:min(100%,var(--reader-width));margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}.next-button{justify-self:end}.progress{color:var(--muted);font:700 12px/1 system-ui,-apple-system,'Segoe UI',sans-serif;white-space:nowrap}.navline button{min-width:92px}
.drawer{position:fixed;inset:0;z-index:20;display:none;background:rgba(0,0,0,.36);padding:calc(12px + var(--top)) 12px calc(12px + var(--bottom))}.drawer.open{display:grid;place-items:start center}.drawer-panel{width:min(100%,var(--reader-width));max-height:92svh;max-height:92dvh;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--paper);border:1px solid var(--rule);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.drawer-head{position:sticky;top:0;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:12px;margin:-16px -16px 12px;padding:16px;background:var(--paper);border-bottom:1px solid var(--rule);border-radius:22px 22px 0 0}.drawer h2{font-size:1.35rem;margin:0}.chapters-list{display:grid;gap:9px}.chapters-list button{width:100%;border-radius:16px;text-align:left;justify-content:flex-start;padding:13px 14px;min-height:48px;font-size:15px;line-height:1.25}.chapters-list button[aria-current="true"]{border-color:var(--accent);background:var(--accent-soft)}.hint{color:var(--muted);font:13px/1.38 system-ui,-apple-system,'Segoe UI',sans-serif;margin:14px 2px 2px}.reference-material{display:none}.loading{padding-top:24px}
@media (min-width:680px){.topline{grid-template-columns:auto 1fr auto}.chapter-title{grid-column:auto;text-align:center}.chapter-inner{padding-left:24px;padding-right:24px}.reader-footer,.site-header{padding-left:18px;padding-right:18px}}
@media (max-width:380px){.book-title{font-size:15px}.navline button{min-width:82px;padding-left:11px;padding-right:11px}.chapter-inner{padding-left:16px;padding-right:16px}p,li{font-size:18.2px}}
@media(prefers-color-scheme:dark){:root{--bg:#201d19;--paper:#2a251f;--ink:#eee3d3;--muted:#bbaea0;--rule:rgba(238,227,211,.20);--accent:#d2b48c;--accent-soft:rgba(210,180,140,.11);--shadow:0 20px 56px rgba(0,0,0,.52)}.site-header,.reader-footer{background:color-mix(in srgb,var(--bg) 92%,black)}.drawer{background:rgba(0,0,0,.58)}.reader{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0) 80px)}}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="site-header">
    <div class="topline">
      <div class="book-title">The Correctable Record</div>
      <button type="button" id="menuButton" class="menu-button" aria-controls="chapterMenu" aria-expanded="false">Chapters</button>
      <div class="chapter-title" id="currentTitle">Loading</div>
    </div>
  </header>
  <main class="reader" id="reader" aria-live="polite">
    <article class="chapter active"><div class="chapter-scroll"><div class="chapter-inner loading"><p>Loading the book.</p></div></div></article>
  </main>
  <footer class="reader-footer">
    <div class="navline">
      <button type="button" id="prevButton">Previous</button>
      <div class="progress" id="progress">—</div>
      <button type="button" id="nextButton" class="next-button">Next</button>
    </div>
  </footer>
</div>
<div class="drawer" id="chapterMenu" role="dialog" aria-modal="true" aria-label="Chapter menu">
  <div class="drawer-panel">
    <div class="drawer-head"><h2>Chapters</h2><button type="button" id="closeMenu">Close</button></div>
    <div class="chapters-list" id="chapterList"></div>
    <p class="hint">Each chapter scrolls vertically. Swipe left or right anywhere in the reading area to move chapter.</p>
  </div>
</div>
<div class="reference-material" id="referenceMaterial" aria-hidden="true"></div>
<script>
(function(){
  const reader=document.getElementById('reader');
  const list=document.getElementById('chapterList');
  const reference=document.getElementById('referenceMaterial');
  const currentTitle=document.getElementById('currentTitle');
  const progress=document.getElementById('progress');
  const prev=document.getElementById('prevButton');
  const next=document.getElementById('nextButton');
  const menu=document.getElementById('chapterMenu');
  const menuButton=document.getElementById('menuButton');
  const closeMenu=document.getElementById('closeMenu');
  let chapters=[];
  let chapterButtons=[];
  let index=Number(localStorage.getItem('correctableRecordChapter')||0);

  function splitBook(doc){
    const main=doc.querySelector('main')||doc.body;
    const nodes=Array.from(main.children);
    const sections=[];
    let cur={title:'Front Matter',els:[]};
    nodes.forEach(el=>{
      if(el.tagName==='H1'){
        if(cur.els.length) sections.push(cur);
        cur={title:el.textContent.trim(),els:[el]};
      }else{
        cur.els.push(el);
      }
    });
    if(cur.els.length) sections.push(cur);
    const reading=[];
    const refs=[];
    sections.forEach(s=>{
      const m=s.title.match(/^(\d+)\.\s*(.*)$/);
      if(m && Number(m[1])>=1 && Number(m[1])<=15){
        const displayTitle=m[2];
        const heading=s.els[0].cloneNode(true);
        heading.textContent=displayTitle;
        s.els=[heading,...s.els.slice(1)];
        s.title=displayTitle;
        reading.push(s);
      }else{
        refs.push(s);
      }
    });
    return {reading,refs};
  }

  function render(reading,refs){
    reader.innerHTML='';
    list.innerHTML='';
    reference.innerHTML='';
    chapters=[];
    chapterButtons=[];
    reading.forEach((s,i)=>{
      const article=document.createElement('article');
      article.className='chapter';
      article.dataset.title=s.title;
      const scroll=document.createElement('div');
      scroll.className='chapter-scroll';
      scroll.tabIndex=0;
      const inner=document.createElement('div');
      inner.className='chapter-inner';
      inner.innerHTML='<p class="chapter-kicker">Chapter '+(i+1)+' of '+reading.length+'</p>';
      s.els.forEach(el=>inner.appendChild(el.cloneNode(true)));
      scroll.appendChild(inner);
      article.appendChild(scroll);
      reader.appendChild(article);
      chapters.push(article);

      const b=document.createElement('button');
      b.type='button';
      b.textContent=(i+1)+'. '+s.title;
      b.addEventListener('click',()=>{hideMenu();show(i,true)});
      list.appendChild(b);
      chapterButtons.push(b);
    });
    refs.forEach(s=>{
      const sec=document.createElement('section');
      sec.dataset.title=s.title;
      s.els.forEach(el=>sec.appendChild(el.cloneNode(true)));
      reference.appendChild(sec);
    });
    show(Math.min(Math.max(index,0),chapters.length-1),false);
  }

  function show(i,focusReader){
    if(!chapters.length) return;
    index=Math.max(0,Math.min(chapters.length-1,i));
    chapters.forEach((c,n)=>c.classList.toggle('active',n===index));
    chapterButtons.forEach((b,n)=>b.setAttribute('aria-current',n===index?'true':'false'));
    currentTitle.textContent=chapters[index].dataset.title||'';
    progress.textContent=(index+1)+' / '+chapters.length;
    prev.disabled=index===0;
    next.disabled=index===chapters.length-1;
    localStorage.setItem('correctableRecordChapter',String(index));
    const sc=chapters[index].querySelector('.chapter-scroll');
    if(sc){sc.scrollTop=0;if(focusReader) sc.focus({preventScroll:true});}
  }
  function openMenu(){menu.classList.add('open');menuButton.setAttribute('aria-expanded','true')}
  function hideMenu(){menu.classList.remove('open');menuButton.setAttribute('aria-expanded','false')}

  prev.addEventListener('click',()=>show(index-1,true));
  next.addEventListener('click',()=>show(index+1,true));
  menuButton.addEventListener('click',openMenu);
  closeMenu.addEventListener('click',hideMenu);
  menu.addEventListener('click',e=>{if(e.target===menu)hideMenu()});
  document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(index-1,true); if(e.key==='ArrowRight')show(index+1,true); if(e.key==='Escape')hideMenu()});

  let sx=0,sy=0,st=0;
  reader.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;st=Date.now();},{passive:true});
  reader.addEventListener('touchend',e=>{
    const t=e.changedTouches[0];
    const dx=t.clientX-sx;
    const dy=t.clientY-sy;
    const dt=Date.now()-st;
    if(Math.abs(dx)>64 && Math.abs(dx)>Math.abs(dy)*1.5 && dt<850){dx<0?show(index+1,true):show(index-1,true)}
  },{passive:true});

  fetch('correctable_record_simple.html',{cache:'no-store'})
    .then(r=>{if(!r.ok) throw new Error('source missing'); return r.text();})
    .then(html=>{const doc=new DOMParser().parseFromString(html,'text/html'); const parts=splitBook(doc); render(parts.reading,parts.refs);})
    .catch(()=>{currentTitle.textContent='Book unavailable';reader.innerHTML='<article class="chapter active"><div class="chapter-scroll"><div class="chapter-inner"><h1>Book unavailable</h1><p>The source file could not be loaded. Check that correctable_record_simple.html is in the repository root beside index.html.</p></div></div></article>';progress.textContent='—';prev.disabled=true;next.disabled=true;});
})();
</script>
</body>
</html>
